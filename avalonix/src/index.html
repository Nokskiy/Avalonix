<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="sections.css" />
    <link rel="stylesheet" href="buttons.css" />
    <link rel="stylesheet" href="main-container.css" />
    <link rel="stylesheet" href="scrollbar.css" />
    <link rel="stylesheet" href="img.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/main.js" defer></script>
    <script src="/tabSwitcher.js" defer></script>
    <title>Tauri App</title>
  </head>
  <body>
    <section class="sections-container">
      <section class="section tabs">
        <button onclick="changeTab(0)" class="pick-btn">
            <h3>Main</h3>
        </button>
        <button onclick="changeTab(1)" class="pick-btn">
            <h3>Albums</h3>
        </button>
        <button class="pick-btn">
            <h3>Artists</h3>
        </button>
        <button class="pick-btn">
            <h3>Metadata</h3>
        </button>
      </section>
      
      <section class="section main">
        <div class="main-container tracks-queue">
          <h2 class="main-presentable-text">Play queue</h2>

          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
        </div>
        <div class="main-container settings">
          <h2 class="main-presentable-text">Albums list</h2>
        </div>
      </section>

      <section class="section track-info">
        <h2 class="track-name">Track name</h2>
        <img class="album-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8lSTbrXUdmDeJ6akFnVFRbPTNMZeO3L-RwA&s">
        <h3 class="album-name">Album name</h3>
      </section>

      <section class="section playback-controll">
        <button class="playbar-btn">
          <h1>⏮</h1>
        </button>
        <button class="playbar-btn">
          <h1>⏸</h1>
        </button>
        <button class="playbar-btn">
          <h1>⏭</h1>
        </button>
      </section>
    </section>
  </body>
</html>
