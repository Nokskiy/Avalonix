<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="sections.css" />
    <link rel="stylesheet" href="buttons.css" />
    <link rel="stylesheet" href="main-container.css" />
    <link rel="stylesheet" href="scrollbar.css" />
    <link rel="stylesheet" href="img.css" />
    <link rel="stylesheet" href="playback.css" />
    <link rel="stylesheet" href="slider.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/main.js" defer></script>
    <script src="/tabSwitcher.js" defer></script>
    <title>Tauri App</title>
  </head>
  <body>
    <section class="sections-container">
      <section class="section tabs">
        <button onclick="changeTab(0)" class="pick-btn">
            <h3>Main</h3>
        </button>
        <button onclick="changeTab(1)" class="pick-btn">
            <h3>Albums</h3>
        </button>
        <button onclick="changeTab(2)" class="pick-btn">
            <h3>Artists</h3>
        </button>
        <button onclick="changeTab(3)" class="pick-btn">
            <h3>Metadata</h3>
        </button>
        <button onclick="changeTab(4)" class="pick-btn">
            <h3>Settings</h3>
        </button>
      </section>
      
      <section class="section main">
        <div class="main-container tracks-queue">
          <h2 class="main-presentable-text">Play queue</h2>

          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          </button>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Albums list</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Artists list</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Metadata</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Settings</h2>
          <section class="section musics-path-list">
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
            </section>
        </div>
      </section>

      <section class="section track-info">
        <h2 class="track-name">Track name</h2>
        <img class="album-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8lSTbrXUdmDeJ6akFnVFRbPTNMZeO3L-RwA&s">
        <h3 class="album-name">Album name</h3>
      </section>

      <section class="section playback-controll">
        <section class="playback-control-playback-controll">
          <button class="playbar-btn">
            <h1>⏮</h1>
          </button>
          <button class="playbar-btn">
            <h1>⏸</h1>
          </button>
          <button class="playbar-btn">
            <h1>⏭</h1>
          </button>
        </section>

        <section class="playback-control-player">
          <input type="range" id="slider-volume" min="0" max="100" step="1" value="100">
        </section>

        <section class="playback-control-player">
          <input type="range" id="slider-playback" min="0" max="100" step="1" value="100">
        </section>
      </section>
    </section>
  </body>
</html>
